# pubspec.yaml
name: my_cure_ui
description: MY CURE Login UI with BLoC
publish_to: 'none'

environment:
  sdk: ">=3.3.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter

  flutter_bloc: ^8.1.5
  equatable: ^2.0.5
  carousel_slider: ^5.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true

  assets:
    - assets/logo.png
    - assets/property_tax_banner.png
    - assets/water_bill_banner.png